name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build all images
        run: docker-compose build

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'

      - name: Run Docker Scout quickview
        uses: docker/scout-action@v1
        with:
          command: quickview

      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push images to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag greenops-api-gateway ${{ secrets.DOCKER_USERNAME }}/greenops-api-gateway:latest
          docker tag greenops-auth-service ${{ secrets.DOCKER_USERNAME }}/greenops-auth-service:latest
          docker tag greenops-metrics-service ${{ secrets.DOCKER_USERNAME }}/greenops-metrics-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/greenops-api-gateway:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/greenops-auth-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/greenops-metrics-service:latest