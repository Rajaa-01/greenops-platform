name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Préparer .env
      - name: Prepare .env
        run: |
          if [ -f .env.example ]; then cp .env.example .env; else touch .env; fi

      # 4. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 5. Build & Push api-gateway
      - name: Build and Push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/greenops-api-gateway:latest

      # 6. Build & Push auth-service
      - name: Build and Push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/greenops-auth-service:latest

      # 7. Build & Push metrics-service
      - name: Build and Push metrics-service
        uses: docker/build-push-action@v5
        with:
          context: ./metrics-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/greenops-metrics-service:latest