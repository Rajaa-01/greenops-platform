name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Setup Docker Compose
      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin
          docker compose version

      # 3. Env file
      - name: Prepare .env
        run: |
          [ -f .env.example ] && cp .env.example .env || true

      # 4. Build images
      - name: Build images
        run: docker compose build

      # 5. Check images exist (IMPORTANT DEBUG STEP)
      - name: List Docker images
        run: docker images

      # 6. Login Docker Hub (SAFE)
      - name: Docker login
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 7. Tag images
      - name: Tag images
        run: |
          docker tag api-gateway ${{ secrets.DOCKER_USERNAME }}/greenops-api-gateway:latest || true
          docker tag auth-service ${{ secrets.DOCKER_USERNAME }}/greenops-auth-service:latest || true
          docker tag metrics-service ${{ secrets.DOCKER_USERNAME }}/greenops-metrics-service:latest || true

      # 8. Push images
      - name: Push images
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/greenops-api-gateway:latest || true
          docker push ${{ secrets.DOCKER_USERNAME }}/greenops-auth-service:latest || true
          docker push ${{ secrets.DOCKER_USERNAME }}/greenops-metrics-service:latest || true