name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Vérifier Docker
      - name: Check Docker version
        run: |
          docker --version
          docker compose version

      # 4. Préparer .env
      - name: Prepare .env
        run: |
          if [ -f .env.example ]; then cp .env.example .env; fi

      # 5. Login Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # 6. Build images
      - name: Build images
        run: docker compose build

      # 7. Tag & Push images
      - name: Tag and Push images
        run: |
          docker tag api-gateway ${{ secrets.DOCKER_USERNAME }}/greenops-api-gateway:latest
          docker tag auth-service ${{ secrets.DOCKER_USERNAME }}/greenops-auth-service:latest
          docker tag metrics-service ${{ secrets.DOCKER_USERNAME }}/greenops-metrics-service:latest

          docker push ${{ secrets.DOCKER_USERNAME }}/greenops-api-gateway:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/greenops-auth-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/greenops-metrics-service:latest