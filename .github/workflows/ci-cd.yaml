name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-and-scan:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Install Docker Compose (important sur runner Ubuntu)
      - name: Install Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose-plugin
          docker compose version

      # 3. Create .env file (évite crash variables manquantes)
      - name: Prepare environment file
        run: |
          if [ -f .env.example ]; then cp .env.example .env; fi

      # 4. Build images
      - name: Build Docker images
        run: docker compose build

      # 5. Start services (optional test)
      - name: Start containers (optional)
        run: docker compose up -d

      # 6. Docker Hub login
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # 7. Tag images
      - name: Tag images
        run: |
          docker tag greenops-api-gateway ${{ secrets.DOCKER_USERNAME }}/greenops-api-gateway:latest
          docker tag greenops-auth-service ${{ secrets.DOCKER_USERNAME }}/greenops-auth-service:latest
          docker tag greenops-metrics-service ${{ secrets.DOCKER_USERNAME }}/greenops-metrics-service:latest

      # 8. Push images
      - name: Push images to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/greenops-api-gateway:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/greenops-auth-service:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/greenops-metrics-service:latest