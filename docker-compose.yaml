version: '3.8'

networks:
  frontend-network:
    driver: bridge
  backend-network:
    driver: bridge
    internal: false   # accessible uniquement via gateway, mais interne aux services
  monitoring-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  grafana-data:
    driver: local
  prometheus-data:
    driver: local
  redis-data:               # <-- AJOUTÉ (manquait)
    driver: local

services:
  # ----------------------------------------------
  #  Reverse Proxy Nginx
  # ----------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./frontend/build:/usr/share/nginx/html/frontend:ro   # build React
    depends_on:
      - api-gateway
      - frontend-build
      - grafana
    networks:
      - frontend-network
    restart: unless-stopped

  # ----------------------------------------------
  #  Frontend React (build statique)
  # ----------------------------------------------
  frontend-build:
    build:
      context: ./frontend
      target: builder   # multi-stage : build puis copie
    container_name: frontend-builder
    volumes:
      - ./frontend/build:/app/build   # expose le build à l'hôte pour Nginx
    networks:
      - frontend-network
    command: ["sh", "-c", "npm run build && sleep infinity"]  # garde actif pour volume

  # ----------------------------------------------
  #  API Gateway (Node.js)
  # ----------------------------------------------
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    env_file:
      - .env
    environment:
      - AUTH_SERVICE_URL=http://auth-service:5000
      - METRICS_SERVICE_URL=http://metrics-service:5001
    ports:
      - "4000:4000"
    depends_on:
      - auth-service
      - metrics-service
      - redis
    networks:
      - frontend-network
      - backend-network
    restart: unless-stopped

  # ----------------------------------------------
  #  Auth Service (JWT)
  # ----------------------------------------------
  auth-service:
    build: ./auth-service
    container_name: auth-service
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
    networks:
      - backend-network
      - monitoring-network
    restart: unless-stopped

  # ----------------------------------------------
  #  Metrics Service (métriques énergétiques)
  # ----------------------------------------------
  metrics-service:
    build: ./metrics-service
    container_name: metrics-service
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis
    networks:
      - backend-network
      - monitoring-network
    restart: unless-stopped

  # ----------------------------------------------
  #  PostgreSQL
  # ----------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: postgres
    env_file:
      - .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - backend-network
    restart: unless-stopped

  # ----------------------------------------------
  #  Redis
  # ----------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data            # <-- maintenant ce volume existe
    networks:
      - backend-network
    restart: unless-stopped

  # ----------------------------------------------
  #  Prometheus
  # ----------------------------------------------
  prometheus:
    image: prom/prometheus:v2.47.0
    container_name: prometheus
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - monitoring-network
      - backend-network
    restart: unless-stopped

  # ----------------------------------------------
  #  Grafana
  # ----------------------------------------------
  grafana:
    image: grafana/grafana:10.2.0
    container_name: grafana
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    ports:
      - "3000:3000"
    networks:
      - frontend-network
      - monitoring-network
    depends_on:
      - prometheus
    restart: unless-stopped
