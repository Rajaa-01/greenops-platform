# ─────────────────────────────────────────────
# Service – PostgreSQL (ClusterIP)
# ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: greenops
  labels:
    app: postgres
    app.kubernetes.io/part-of: greenops-platform
spec:
  type: ClusterIP
  selector:
    app: postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
      protocol: TCP
---
