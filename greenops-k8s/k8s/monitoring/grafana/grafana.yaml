# ─────────────────────────────────────────────
# ConfigMap – Grafana datasource provisioning
# ─────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: greenops-monitoring
  labels:
    app: grafana
    app.kubernetes.io/part-of: greenops-platform
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-service:9090
        isDefault: true
        editable: false
        jsonData:
          timeInterval: "15s"
---
# ─────────────────────────────────────────────
# ConfigMap – Grafana dashboard provisioning
# ─────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards-provider
  namespace: greenops-monitoring
  labels:
    app: grafana
    app.kubernetes.io/part-of: greenops-platform
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: GreenOps
        orgId: 1
        folder: GreenOps Platform
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards
---
# ─────────────────────────────────────────────
# ConfigMap – GreenOps Grafana dashboard JSON
# ─────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-greenops
  namespace: greenops-monitoring
  labels:
    app: grafana
    app.kubernetes.io/part-of: greenops-platform
data:
  greenops-overview.json: |
    {
      "title": "GreenOps Platform Overview",
      "uid": "greenops-overview",
      "schemaVersion": 38,
      "version": 1,
      "refresh": "15s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Services UP",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "targets": [{
            "expr": "count(up == 1)",
            "legendFormat": "Services UP"
          }],
          "options": { "colorMode": "background" },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": 0 },
                  { "color": "green", "value": 3 }
                ]
              }
            }
          }
        },
        {
          "id": 2,
          "title": "CPU Usage by Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 4 },
          "targets": [{
            "expr": "rate(process_cpu_seconds_total[1m]) * 100",
            "legendFormat": "{{job}} - {{pod}}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "custom": { "lineWidth": 2 }
            }
          }
        },
        {
          "id": 3,
          "title": "Memory Usage by Service",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 4 },
          "targets": [{
            "expr": "process_resident_memory_bytes / 1024 / 1024",
            "legendFormat": "{{job}} - {{pod}}"
          }],
          "fieldConfig": {
            "defaults": { "unit": "MB" }
          }
        },
        {
          "id": 4,
          "title": "Energy Requests Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 12 },
          "targets": [{
            "expr": "rate(energy_requests_total[1m])",
            "legendFormat": "req/s - {{pod}}"
          }],
          "fieldConfig": {
            "defaults": { "unit": "reqps" }
          }
        },
        {
          "id": 5,
          "title": "HTTP Request Latency P95",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 12 },
          "targets": [{
            "expr": "histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))",
            "legendFormat": "P95 {{job}}"
          }],
          "fieldConfig": {
            "defaults": { "unit": "s" }
          }
        },
        {
          "id": 6,
          "title": "Pod Replicas",
          "type": "stat",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "targets": [{
            "expr": "kube_deployment_status_replicas_ready{namespace='greenops'}",
            "legendFormat": "{{deployment}}"
          }]
        },
        {
          "id": 7,
          "title": "HTTP Error Rate (5xx)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 20 },
          "targets": [{
            "expr": "rate(http_requests_total{status=~'5..'}[5m])",
            "legendFormat": "5xx - {{job}}"
          }],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": 0 },
                  { "color": "red", "value": 1 }
                ]
              }
            }
          }
        }
      ]
    }
---
# ─────────────────────────────────────────────
# Deployment – Grafana
# ─────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: greenops-monitoring
  labels:
    app: grafana
    app.kubernetes.io/part-of: greenops-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 472     # grafana user
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.4.0
          ports:
            - containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: GF_SECURITY_ADMIN_USER
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-secret
                  key: GF_SECURITY_ADMIN_PASSWORD
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_LOG_LEVEL
              value: "info"
            - name: GF_SERVER_ROOT_URL
              value: "http://grafana.greenops.local"
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: grafana-datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: grafana-dashboards-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: grafana-dashboard-greenops
              mountPath: /var/lib/grafana/dashboards
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "300m"
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-pvc
        - name: grafana-datasources
          configMap:
            name: grafana-datasources
        - name: grafana-dashboards-provider
          configMap:
            name: grafana-dashboards-provider
        - name: grafana-dashboard-greenops
          configMap:
            name: grafana-dashboard-greenops
---
# ─────────────────────────────────────────────
# Service – Grafana
# ─────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: grafana-service
  namespace: greenops-monitoring
  labels:
    app: grafana
    app.kubernetes.io/part-of: greenops-platform
spec:
  type: ClusterIP
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: 3000
