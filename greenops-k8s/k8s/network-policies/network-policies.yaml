# ─────────────────────────────────────────────────────────────────────────────
# NetworkPolicies – Isolation des communications inter-services
# Prérequis : CNI supportant les NetworkPolicies (Calico, Cilium, Weave)
# ─────────────────────────────────────────────────────────────────────────────

# ─────────────────────────────────────────────
# Politique par défaut : tout refuser dans le namespace greenops
# ─────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-all
  namespace: greenops
  labels:
    app.kubernetes.io/part-of: greenops-platform
spec:
  podSelector: {}
  policyTypes:
    - Ingress
    - Egress
---
# ─────────────────────────────────────────────
# Allow DNS (CoreDNS)
# ─────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-dns
  namespace: greenops
spec:
  podSelector: {}
  policyTypes:
    - Egress
  egress:
    - ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
---
# ─────────────────────────────────────────────
# Frontend – autorise ingress depuis l'ingress controller
# ─────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-netpol
  namespace: greenops
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 80
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 4000
---
# ─────────────────────────────────────────────
# API Gateway – ingress depuis frontend + ingress controller
# ─────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: api-gateway-netpol
  namespace: greenops
spec:
  podSelector:
    matchLabels:
      app: api-gateway
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - port: 4000
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: greenops-monitoring
      ports:
        - port: 4000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: auth-service
      ports:
        - port: 5000
    - to:
        - podSelector:
            matchLabels:
              app: metrics-service
      ports:
        - port: 5001
---
# ─────────────────────────────────────────────
# Auth Service – ingress depuis api-gateway, egress vers postgres + redis
# ─────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: auth-service-netpol
  namespace: greenops
spec:
  podSelector:
    matchLabels:
      app: auth-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 5000
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: greenops-monitoring
      ports:
        - port: 5000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
---
# ─────────────────────────────────────────────
# Metrics Service – ingress depuis api-gateway, egress vers postgres + redis
# ─────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: metrics-service-netpol
  namespace: greenops
spec:
  podSelector:
    matchLabels:
      app: metrics-service
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: api-gateway
      ports:
        - port: 5001
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: greenops-monitoring
      ports:
        - port: 5001
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres
      ports:
        - port: 5432
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
---
# ─────────────────────────────────────────────
# PostgreSQL – ingress uniquement depuis services backend
# ─────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-netpol
  namespace: greenops
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: backend
      ports:
        - port: 5432
---
# ─────────────────────────────────────────────
# Redis – ingress uniquement depuis services backend
# ─────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: redis-netpol
  namespace: greenops
spec:
  podSelector:
    matchLabels:
      app: redis
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              tier: backend
      ports:
        - port: 6379
