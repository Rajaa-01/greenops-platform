# ─────────────────────────────────────────────
# PVC – PostgreSQL
# ─────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: greenops
  labels:
    app: postgres
    app.kubernetes.io/part-of: greenops-platform
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: standard
  resources:
    requests:
      storage: 5Gi
---
