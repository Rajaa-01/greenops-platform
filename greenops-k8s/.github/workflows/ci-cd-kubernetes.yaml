name: GreenOps – CI/CD Kubernetes

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/greenops

jobs:
  # ─────────────────────────────────────────────
  # Job 1 – Tests & Lint
  # ─────────────────────────────────────────────
  test:
    name: Tests & Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies – API Gateway
        working-directory: ./api-gateway
        run: npm ci --omit=dev

      - name: Install dependencies – Auth Service
        working-directory: ./auth-service
        run: npm ci --omit=dev

      - name: Install dependencies – Metrics Service
        working-directory: ./metrics-service
        run: npm ci --omit=dev

      - name: Lint – API Gateway
        working-directory: ./api-gateway
        run: npm run lint --if-present

      - name: Lint – Auth Service
        working-directory: ./auth-service
        run: npm run lint --if-present

      - name: Unit Tests
        run: |
          cd api-gateway && npm test --if-present
          cd ../auth-service && npm test --if-present
          cd ../metrics-service && npm test --if-present

  # ─────────────────────────────────────────────
  # Job 2 – Build & Push Images
  # ─────────────────────────────────────────────
  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    outputs:
      image-tag: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=semver,pattern={{version}}
            latest

      - name: Build & Push – Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push – API Gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api-gateway:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push – Auth Service
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/auth-service:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push – Metrics Service
        uses: docker/build-push-action@v5
        with:
          context: ./metrics-service
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/metrics-service:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─────────────────────────────────────────────
  # Job 3 – Security Scan (Trivy)
  # ─────────────────────────────────────────────
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Trivy – API Gateway
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api-gateway:${{ needs.build.outputs.image-tag }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: '1'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

      - name: Validate Kubernetes manifests
        run: |
          curl -LO https://github.com/instrumenta/kubeval/releases/latest/download/kubeval-linux-amd64.tar.gz
          tar xf kubeval-linux-amd64.tar.gz
          find k8s/ -name "*.yaml" | xargs ./kubeval --strict

  # ─────────────────────────────────────────────
  # Job 4 – Deploy (optionnel, sur cluster distant)
  # ─────────────────────────────────────────────
  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: [build, security-scan]
    if: github.ref == 'refs/heads/main'
    environment: production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure kubectl
        uses: azure/k8s-set-context@v4
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBECONFIG }}

      - name: Update image tags in manifests
        run: |
          IMAGE_TAG=${{ needs.build.outputs.image-tag }}
          sed -i "s|greenops/api-gateway:latest|${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/api-gateway:${IMAGE_TAG}|g" k8s/deployments/deployments.yaml
          sed -i "s|greenops/auth-service:latest|${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/auth-service:${IMAGE_TAG}|g" k8s/deployments/deployments.yaml
          sed -i "s|greenops/metrics-service:latest|${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/metrics-service:${IMAGE_TAG}|g" k8s/deployments/deployments.yaml
          sed -i "s|greenops/frontend:latest|${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/frontend:${IMAGE_TAG}|g" k8s/deployments/deployments.yaml

      - name: Deploy – Namespaces
        run: kubectl apply -f k8s/namespaces/

      - name: Deploy – RBAC
        run: kubectl apply -f k8s/rbac/

      - name: Deploy – ConfigMaps & Secrets structure
        run: kubectl apply -f k8s/configmaps/

      - name: Deploy – PVCs
        run: kubectl apply -f k8s/pvc/

      - name: Deploy – Monitoring stack
        run: |
          kubectl apply -f k8s/monitoring/prometheus/
          kubectl apply -f k8s/monitoring/grafana/

      - name: Deploy – Application
        run: |
          kubectl apply -f k8s/deployments/
          kubectl apply -f k8s/services/
          kubectl apply -f k8s/ingress/
          kubectl apply -f k8s/hpa/
          kubectl apply -f k8s/network-policies/

      - name: Rollout status check
        run: |
          kubectl rollout status deployment/api-gateway -n greenops --timeout=120s
          kubectl rollout status deployment/auth-service -n greenops --timeout=120s
          kubectl rollout status deployment/metrics-service -n greenops --timeout=120s
          kubectl rollout status deployment/frontend -n greenops --timeout=120s

      - name: Notify on failure
        if: failure()
        run: echo "Deployment failed – rollback may be required"
